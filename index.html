<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutorial: That's Not a Hat | ZonaKepo</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        :root {
            --bg-color: #1a1a1a; /* Abu-abu Gelap */
            --card-color: #262626; /* Abu-abu Sedikit Terang untuk Kartu */
            --accent-color: #ff4757; /* Merah Terang */
            --text-color: #ffffff; /* Putih */
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Arial', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
        }

        .swiper {
            width: 100%;
            height: 100vh;
        }

        .swiper-slide {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        /* Container Kartu */
        .content-card {
            background: var(--card-color);
            padding: 40px 25px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            max-width: 500px;
            width: 90%;
            border: 2px solid #333;
        }

        /* Ukuran Teks Jauh Lebih Besar */
        h1 { font-size: 3.5em; margin: 0; }
        h2 { font-size: 2.8em; color: var(--accent-color); margin-top: 10px; }
        h3 { font-size: 2.2em; margin-bottom: 20px; color: var(--accent-color); }
        p { font-size: 1.6em; line-height: 1.4; margin-bottom: 20px; font-weight: 400; }
        
        .step-number {
            background: var(--accent-color);
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 25px;
            font-size: 1.8em;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(231, 76, 60, 0.4);
        }

        .footer-hint {
            position: absolute;
            bottom: 30px;
            font-size: 1em;
            opacity: 0.5;
            width: 100%;
            text-align: center;
            z-index: 10;
            pointer-events: none;
        }

        /* Tombol Ulang */
        .btn-restart {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 1.4em;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
        }

        /* Slide khusus cover */
        .slide-cover h2 { color: #fff; }

        /* Custom Bullet Pagination */
        .swiper-pagination-bullet {
            background: #555 !important;
            opacity: 1;
            width: 12px;
            height: 12px;
        }
        .swiper-pagination-bullet-active {
            background: var(--accent-color) !important;
        }
    </style>
</head>
<body>

    <div class="swiper mySwiper">
        <div class="swiper-wrapper">
            
            <div class="swiper-slide">
                <div class="content-card slide-cover">
                    <h1>🎩</h1>
                    <h2>THAT'S NOT A HAT</h2>
                    <p style="opacity: 0.7;">Panduan Cepat</p>
                    <small style="font-size: 1.2em;">← Geser untuk Mulai →</small>
                </div>
            </div>

            <div class="swiper-slide">
                <div class="content-card">
                    <div class="step-number">1</div>
                    <h3>Persiapan</h3>
                    <p>Bagi <b>1 kartu tertutup</b> ke tiap pemain. Sisa kartu jadi tumpukan. Buka 1 kartu di depan pengocok.</p>
                </div>
